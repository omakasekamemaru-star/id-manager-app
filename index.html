<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>ID管理メモ</title>
  <link rel="stylesheet" href="style.css?v=20260702-dark-form-contrast">
</head>
<body>
  <header class="app-header">
    <div class="header-copy">
      <p class="eyebrow">No password storage</p>
      <h1>ID管理メモ</h1>
      <p class="header-description">サービス・契約・ログイン先をひとつの一覧で整理できます。</p>
    </div>
    <div class="header-actions">
      <button id="themeToggleButton" class="secondary-button theme-toggle" type="button" aria-pressed="false">🌙 ダーク</button>
      <button id="newRecordButton" class="primary-button" type="button">新規</button>
    </div>
  </header>

  <main>
    <section class="summary" aria-label="料金サマリー">
      <div>
        <span>月額合計</span>
        <strong id="monthlyTotal">0円</strong>
      </div>
      <div>
        <span>年額合計</span>
        <strong id="yearlyTotal">0円</strong>
      </div>
    </section>

    <section class="panel list-panel" aria-label="登録一覧">
      <div class="list-header">
        <div class="list-title-group">
          <h2>登録一覧</h2>
          <div id="listSummary" class="list-summary">件数 0 / 保存場所: なし</div>
        </div>
        <div class="list-actions">
          <span id="recordCount" class="record-count-pill">0件</span>
          <button id="toggleListButton" class="secondary-button list-toggle" type="button" aria-expanded="false">一覧</button>
        </div>
      </div>
      <div id="recordList" class="record-list" hidden></div>
      <p id="emptyMessage" class="empty-message" hidden>まだ登録がありません。右上の「新規」から追加できます。</p>
    </section>

    <section class="panel" aria-label="検索と絞り込み">
      <label class="field">
        <span>検索</span>
        <input id="searchInput" type="search" placeholder="サービス名、メール、URL、メモ">
      </label>

      <div class="filter-grid">
        <label class="field">
          <span>区分</span>
          <select id="categoryFilter">
            <option value="">すべて</option>
            <option value="個人">個人</option>
            <option value="会社">会社</option>
          </select>
        </label>
        <label class="field">
          <span>メール種別</span>
          <select id="emailTypeFilter">
            <option value="">すべて</option>
          </select>
        </label>
        <label class="field">
          <span>ステータス</span>
          <select id="statusFilter">
            <option value="">すべて</option>
          </select>
        </label>
      </div>

      <div class="toolbar">
        <label class="check-row">
          <input id="paidOnlyFilter" type="checkbox">
          <span>有料のみ</span>
        </label>
        <button id="exportButton" class="secondary-button" type="button">CSV出力</button>
        <label class="secondary-button file-button">
          CSV読込
          <input id="importInput" type="file" accept=".csv,text/csv">
        </label>
      </div>
    </section>
  </main>

  <dialog id="recordDialog">
    <form id="recordForm" method="dialog">
      <div class="dialog-header">
        <h2 id="formTitle">新規登録</h2>
        <button id="closeDialogButton" class="icon-button" type="button" aria-label="閉じる">×</button>
      </div>

      <input id="recordId" type="hidden">

      <fieldset>
        <legend>基本情報</legend>
        <label class="field">
          <span>サービス名</span>
          <input id="serviceName" required maxlength="80" autocomplete="off">
        </label>
        <label class="field">
          <span>URL</span>
          <input id="serviceUrl" type="url" inputmode="url" placeholder="https://example.com">
        </label>
        <div class="two-columns">
          <label class="field">
            <span>区分</span>
            <select id="category" required>
              <option value="個人">個人</option>
              <option value="会社">会社</option>
            </select>
          </label>
          <label class="field">
            <span>ステータス</span>
            <select id="status" required></select>
          </label>
        </div>
      </fieldset>

      <fieldset>
        <legend>ログイン情報の所在</legend>
        <label class="field">
          <span>メール種別</span>
          <select id="emailType" required></select>
        </label>
        <label class="field">
          <span>登録メール</span>
          <input id="registeredEmail" type="email" inputmode="email" autocomplete="email">
        </label>
        <div class="two-columns">
          <label class="field">
            <span>ログイン方法</span>
            <select id="loginMethod" required></select>
          </label>
          <label class="field">
            <span>保存場所</span>
            <select id="storageLocation" required></select>
          </label>
        </div>
      </fieldset>

      <fieldset>
        <legend>契約と管理</legend>
        <div class="two-columns">
          <label class="field">
            <span>料金</span>
            <select id="billingType" required></select>
          </label>
          <label class="field">
            <span>金額</span>
            <input id="amount" type="number" inputmode="numeric" min="0" step="1" placeholder="0">
          </label>
        </div>
        <div class="two-columns">
          <label class="field">
            <span>更新日</span>
            <input id="renewalDate" type="date">
          </label>
          <label class="field">
            <span>管理者</span>
            <select id="owner" required></select>
          </label>
        </div>
        <label class="field">
          <span>引き継ぎ必要</span>
          <select id="handoverRequired" required>
            <option value="いいえ">いいえ</option>
            <option value="はい">はい</option>
          </select>
        </label>
      </fieldset>

      <fieldset>
        <legend>メモ</legend>
        <label class="field">
          <span>メモ</span>
          <textarea id="notes" rows="4" placeholder="パスワードは書かないでください"></textarea>
        </label>
      </fieldset>

      <div class="form-actions">
        <button id="deleteButton" class="danger-button" type="button">削除</button>
        <button class="primary-button wide-button" type="submit">保存</button>
      </div>
    </form>
  </dialog>

  <script src="app.js?v=2"></script>
</body>
</html>
